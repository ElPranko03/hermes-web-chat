services:
  hermes:
    build: .
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${HERMES_API_KEY}
    ports:
      - "8642:8642"
    volumes:
      - hermes-data:/root/.hermes

  webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      - OPENAI_API_BASE_URL=http://hermes:8642/v1
      - OPENAI_API_KEY=${HERMES_API_KEY}
    ports:
      - "3000:8080"
    depends_on:
      - hermes

volumes:
  hermes-data:
